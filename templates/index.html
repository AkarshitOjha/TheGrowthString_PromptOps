<!DOCTYPE html>
<html>
<head>
    <title>Arithmetic Calculator</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
    <div class="container">
        <h1 class="text-center mt-4">Arithmetic Calculator</h1>
        <form action="{{ url_for('calculate') }}" method="POST">
            <div class="form-group">
                <input type="number" class="form-control" name="num1" placeholder="Number 1">
            </div>
            <div class="form-group">
                <input type="number" class="form-control" name="num2" placeholder="Number 2">
            </div>
            <div class="form-group">
                <select class="form-control" name="operator">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">*</option>
                    <option value="/">/</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Calculate</button>
        </form>
        <div class="result mt-4"></div>
    </div>
</body>
</html>
